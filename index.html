<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE TEST - 1º SECUNDARIA</title>
    <style>
        :root { 
            --bg: #f8fafc; 
            --primary: #2563eb; 
            --text: #1e293b; 
            --border: #cbd5e1;
            --success: #16a34a;
            --error: #dc2626;
        }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); 
            width: 100%; 
            max-width: 550px; 
            text-align: center; 
        }
        h1 { margin-bottom: 1.5rem; font-size: 2rem; color: #0f172a; }
        p { color: #64748b; margin-bottom: 2rem; }
        label { display: block; text-align: left; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 1.5rem; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
        textarea { height: 130px; resize: vertical; line-height: 1.5; }
        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer; 
            transition: transform 0.1s, background 0.2s;
        }
        button:hover { background: #1d4ed8; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .hidden { display: none; }
        .feedback { 
            text-align: left; 
            padding: 1.2rem; 
            border-radius: 8px; 
            margin-top: 1.5rem; 
            font-size: 0.95rem; 
            border-left: 6px solid; 
            line-height: 1.6;
        }
        .correct { background: #dcfce7; border-color: var(--success); color: #166534; }
        .incorrect { background: #fee2e2; border-color: var(--error); color: #991b1b; }
        #q-count { color: var(--primary); font-weight: bold; letter-spacing: 1px; font-size: 0.8rem; margin-bottom: 0.5rem; }
        .result-item { font-size: 1.1rem; margin: 10px 0; font-weight: 500; }
    </style>
</head>
<body>

<div class="container" id="login-box">
    <h1>THE TEST 🚀</h1>
    <p>Nivel: 1º Secundaria (Avanzado)</p>
    
    <label>Materia a evaluar:</label>
    <select id="topic-select">
        <option value="divisibilidad">Aritmética | Divisibilidad (Lema de Cuya)</option>
        <option value="estadistica">Estadística | Medidas de Posición No Central</option>
        <option value="quimica">Química | Nomenclatura Inorgánica</option>
    </select>

    <label>Identificación (DNI):</label>
    <input type="text" id="dni-input" placeholder="Ingresa los 8 dígitos" maxlength="8">
    
    <button onclick="startQuiz()">Comenzar Evaluación</button>
</div>

<div class="container hidden" id="quiz-box">
    <div id="q-count"></div>
    <h3 id="q-text" style="text-align: left; margin-bottom: 1.5rem; line-height: 1.4;"></h3>
    
    <label>Tu respuesta fundamentada:</label>
    <textarea id="ans-input" placeholder="Escribe tu explicación basándote en lo que leíste en el material..."></textarea>
    
    <button id="btn-eval" onclick="verifyAnswer()">Verificar Respuesta</button>
    
    <div id="system-msg" class="hidden feedback"></div>
    
    <button id="btn-next" class="hidden" onclick="loadQuestion()" style="margin-top:1.5rem; background: #0f172a;">Siguiente Pregunta ➔</button>
</div>

<div class="container hidden" id="result-box">
    <h2>Evaluación Finalizada</h2>
    <div id="res-detail" style="background: #f1f5f9; padding: 25px; border-radius: 12px; margin: 1.5rem 0;"></div>
    <div id="save-status" style="font-weight: bold; font-size: 0.9rem;"></div>
</div>

<script>
    // REEMPLAZAR CON TU URL DE DESPLIEGUE REAL
    const ENDPOINT = "https://script.google.com/macros/s/AKfycbxDqFi4ncYLkCwTKP6JzpK5AQxjy4HWRhAw255h-O5z03KkeOolUeQ-YRBIsccXTJja/exec";
    
    let dni = "";
    let config = null;
    let index = 0;
    let scoreRecords = [];

    // BANCO DE PREGUNTAS ADAPTADO A 1º DE SECUNDARIA
    const banks = {
        divisibilidad: [
            {q: "¿Qué significa matemáticamente que un número 'a' divida a un número 'b' (a | b)?", exp: "Significa que existe un número entero 'k' tal que al multiplicar 'a' por 'k' obtenemos 'b' (b = a * k)."},
            {q: "Si un número divide a 12 y también divide a 20, ¿por qué podemos asegurar que también divide a 32?", exp: "Por la primera propiedad que dice: si 'a' divide a 'b' y 'a' divide a 'c', entonces 'a' divide a la suma (b+c)."},
            {q: "Si sabemos que 5 divide a 15, y 15 divide a 45, ¿qué propiedad nos permite afirmar que 5 divide a 45?", exp: "La propiedad de transitividad, que indica que si a|b y b|c, entonces obligatoriamente a|c."},
            {q: "Si sabemos que 2 divide a 6, ¿qué pasa si elevamos ambos a un exponente 'n' (por ejemplo al cubo)? ¿8 dividirá a 216?", exp: "Sí lo dividirá, por la propiedad que establece que si a|b, entonces a^n divide a b^n para todo entero positivo n."},
            {q: "Si 'a' divide a 'b', y 'b' es un número entero mayor que cero, ¿cuál es la relación de tamaño entre ellos?", exp: "El número 'a' debe ser menor o igual que el número 'b' (a ≤ b)."},
            {q: "¿Qué significa exactamente que dos números enteros sean 'coprimos' o 'primos entre sí'?", exp: "Significa que el único entero positivo que divide a ambos números (su único divisor en común) es el número 1."},
            {q: "¿Por qué cualquier número entero 'a' (distinto de cero) puede dividir al 0?", exp: "Porque siempre existe un entero k=0 tal que se cumple la ecuación: 0 = a * 0."},
            {q: "Si 7 divide a 14, ¿Dividirá también a 14 multiplicado por cualquier otro entero 'k' (14k)? ¿Por qué?", exp: "Sí, por la propiedad 2 que indica que si a|b, entonces 'a' divide a 'k*b' para todo número entero 'k'."},
            {q: "Si 3 divide a 'x' y 3 divide a 'y', ¿por qué 3 también dividirá a la operación (4x + 5y)?", exp: "Por la propiedad 3: si a divide a dos números, también divide a la suma de los múltiplos de esos números (a | bx + cy)."},
            {q: "Si multiplicamos ambos lados de una divisibilidad por un número 'c' (ac | bc), ¿qué podemos concluir al simplificar 'c'?", exp: "Podemos concluir directamente que 'a' divide a 'b' (a | b)."}
        ],
        quimica: [
            // COMPETENCIA 1 (Básicos y Nomenclatura Estándar)
            {q: "En la Nomenclatura Clásica o Tradicional, ¿qué sufijos (terminaciones) se usan para un elemento que tiene dos estados de oxidación (como Fe +2 y +3)?", exp: "Se usa el sufijo '-oso' para la valencia menor y el sufijo '-ico' para la valencia mayor."},
            {q: "¿Cómo se indica el estado de oxidación del elemento metálico en el sistema de Nomenclatura Stock y cuándo se debe omitir?", exp: "Se indica mediante números romanos entre paréntesis. Se omite el número romano si el elemento tiene un único estado de oxidación."},
            {q: "Escribe la diferencia principal entre nombrar el Fe2O3 en nomenclatura Stock y nombrarlo en nomenclatura Sistemática (IUPAC).", exp: "En Stock es Óxido de hierro (III) usando números romanos, y en sistemática es Trióxido de dihierro, usando prefijos numerales (tri, di)."},
            {q: "¿Cómo se nombra un ácido hidrácido (ej. HCl) cuando está en estado gaseoso puro, y cómo cambia su nombre en disolución acuosa?", exp: "En estado gaseoso termina en '-uro de hidrógeno' (Cloruro de hidrógeno). En medio acuoso usa la palabra 'Ácido' y termina en '-hídrico' (Ácido clorhídrico)."},
            {q: "En la formación de Sales Binarias (como el NaCl), ¿qué terminación se le debe poner siempre a la raíz del no metal?", exp: "Se forma usando la raíz del no metal más el sufijo '-uro' seguido del nombre del metal (ejemplo: Clor-uro de sodio)."},
            // COMPETENCIA 2 (Especiales, Oxácidos y Oxisales)
            {q: "¿Cuál es el estado de oxidación aparente del oxígeno en un Superóxido (o Hiperóxido) y cuál es su fórmula iónica general?", exp: "En un superóxido, el estado de oxidación aparente del oxígeno es -1/2 y su anión es (O2)-1."},
            {q: "Los Ozónidos son compuestos altamente inestables y reactivos. ¿Cuál es el anión que los forma y qué valencia aparente tiene el oxígeno ahí?", exp: "Se forman por el anión ozónido (O3)-1, donde el oxígeno actúa con un estado de oxidación fraccionario aparente de -1/3."},
            {q: "Según la teoría de los Oxácidos Hidratados, ¿qué diferencia existe en la formación de un ácido 'Meta-', 'Piro-' y 'Orto-'?", exp: "Se diferencian por la cantidad de agua: Meta- resulta de sumar 1 molécula de H2O, Piro- suma 2 moléculas de H2O y Orto- suma 3 moléculas de H2O."},
            {q: "Al convertir un oxácido en una oxisal (sal ternaria), ¿cuál es la regla fundamental para cambiar los sufijos '-oso' e '-ico' del ácido original?", exp: "La regla es que el sufijo '-oso' del ácido cambia por '-ito' en la sal, y el sufijo '-ico' cambia por '-ato'."},
            {q: "¿Qué es un Peroxoácido y qué cambio se observa en su fórmula química si lo comparamos con su ácido simple original?", exp: "Se forma al sustituir un oxígeno (-O-) por un grupo peroxo (-O-O-), por lo que en su fórmula se observa un oxígeno extra respecto al ácido normal."}
        ],
        estadistica: [
            {q: "Antes de aplicar cualquier fórmula para calcular medidas de posición no central (como cuartiles o deciles), ¿cuál es el paso 1 obligatorio?", exp: "El paso 1 es ordenar los datos de la muestra en orden creciente, es decir, de menor a mayor."},
            {q: "En la fórmula de posición (Posición = k * n / Divisor), ¿qué representa exactamente la variable 'n' y la variable 'k'?", exp: "'n' representa el total de datos de la muestra y 'k' es el número de la parte específica que se está buscando."},
            {q: "Regla de los decimales: Si al calcular la fórmula de posición obtienes un resultado decimal (por ejemplo 4.2), ¿qué debes hacer para encontrar tu dato?", exp: "Si el resultado es decimal, la regla indica que se debe usar siempre el número entero siguiente (en este caso, buscar el dato en la posición 5)."},
            {q: "Según la tabla, ¿en cuántas partes iguales divide a los datos un 'Sextil' y qué número se debe usar como 'Divisor' en su fórmula?", exp: "Divide el conjunto de datos en 6 partes iguales, por lo que su divisor matemático en la fórmula es el número 6."},
            {q: "Estadísticamente, ¿qué significa que tu nota de un examen se encuentre en el Decil 8 (o Percentil 80)?", exp: "Significa que el 80% de los datos (o de los estudiantes) obtuvieron una nota menor o igual a tu valor obtenido."},
            {q: "¿Cuál es la diferencia matemática entre las 'Partes' y los 'Cortes' al dividir una muestra de datos? Explícalo con su fórmula sencilla.", exp: "Las partes son los grupos iguales en los que se divide la muestra, mientras que los cortes son las marcas para crear esas partes. La fórmula es Cortes = N - 1."},
            {q: "A diferencia de los Cuartiles o Deciles, ¿qué característica principal tienen las llamadas 'Escalas Especiales' (como Estaninos o Escala C)?", exp: "La característica de las escalas especiales es que usan porcentajes variables, es decir, NO dividen los datos en partes iguales."},
            {q: "Si el problema te pide interpretar un Vigésile 1 (donde k=1), ¿qué porcentaje exacto de los datos es menor o igual a ese valor?", exp: "El 5% de los datos es menor o igual al valor obtenido (ya que 1 dividido entre 20 partes da 0.05 o 5%)."},
            {q: "Observando la tabla, ¿en cuántas partes (N) divide la medida llamada 'Vigésile' a la muestra y cuántos cortes tiene en total?", exp: "El Vigésile divide la muestra en 20 partes iguales (N=20) y por lo tanto tiene 19 cortes (N-1)."},
            {q: "¿Por qué en la teoría el porcentaje de cada parte se calcula dividiendo 1 entre el número de partes (1/N)? Da un ejemplo con Terciles.", exp: "Porque '1' representa el 100% (el total de los datos). Por ejemplo, en Terciles (N=3), al dividir 1/3 se obtiene 0.3333, que representa el 33.33% por parte."}
        ]
    };

    function startQuiz() {
        dni = document.getElementById('dni-input').value.trim();
        if(dni.length !== 8 || isNaN(dni)) return alert("DNI no válido.");
        
        const topicKey = document.getElementById('topic-select').value;
        const selectedQuestions = [...banks[topicKey]].sort(() => 0.5 - Math.random()).slice(0, 10);
        
        config = { 
            topic: topicKey, 
            questions: selectedQuestions,
            sheetName: topicKey === "quimica" ? "Química" : "Aritmética Algebra",
            targetCols: topicKey === "divisibilidad" ? ["L"] : (topicKey === "quimica" ? ["O", "V"] : ["AJ"])
        };

        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('quiz-box').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if(index >= 10) return finish();
        
        let labelComp = "";
        if(config.topic === "quimica") {
            labelComp = index < 5 ? " | COMPETENCIA 1" : " | COMPETENCIA 2";
        }

        document.getElementById('q-count').innerText = `DESAFÍO ${index + 1} DE 10${labelComp}`;
        document.getElementById('q-text').innerText = config.questions[index].q;
        document.getElementById('ans-input').value = "";
        document.getElementById('ans-input').disabled = false;
        document.getElementById('system-msg').classList.add('hidden');
        
        const btnEval = document.getElementById('btn-eval');
        btnEval.disabled = false;
        btnEval.innerText = "Verificar Respuesta";
        btnEval.classList.remove('hidden');
        
        document.getElementById('btn-next').classList.add('hidden');
    }

    async function verifyAnswer() {
        const btn = document.getElementById('btn-eval');
        const ans = document.getElementById('ans-input').value.trim();
        if(ans.length < 5) return alert("Por favor, fundamenta un poco más tu respuesta.");

        btn.disabled = true;
        btn.innerText = "Verificando respuesta...";

        const prompt = `Actúa como profesor evaluador de 1ro de Secundaria. Pregunta: "${config.questions[index].q}". Respuesta alumno: "${ans}". Criterio correcto basado en el PDF: "${config.questions[index].exp}". Responde ÚNICAMENTE empezando con "CORRECTA" o "INCORRECTA" nada mas, nada de explicaciones de por qué esta pregunta es correcta o incorrecta.`;

        try {
            const res = await fetch(ENDPOINT, { 
                method: 'POST', 
                body: JSON.stringify({ action: "process_eval", prompt: prompt }) 
            });
            const data = await res.json();
            
            if(data.status === "error") throw new Error(data.message);

            const systemRes = data.system_response;
            const isCorrect = systemRes.toUpperCase().startsWith("CORRECTA");
            
            scoreRecords.push(isCorrect);
            
            const msgDiv = document.getElementById('system-msg');
            msgDiv.innerText = systemRes;
            msgDiv.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            msgDiv.classList.remove('hidden');
            
            document.getElementById('ans-input').disabled = true;
            btn.classList.add('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
            index++;
        } catch (e) { 
            alert("Error de conexión: " + e.message); 
            btn.disabled = false;
            btn.innerText = "Verificar Respuesta";
        }
    }

    function getGradeLetter(correctas, total) {
        let pct = (correctas / total) * 100;
        if(pct >= 90) return "AD";
        if(pct >= 70) return "A";
        if(pct >= 50) return "B";
        return "C";
    }

    async function finish() {
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');
        
        let fetches = [];
        let htmlResults = "";

        if(config.targetCols.length === 1) {
            let correct = scoreRecords.filter(x => x).length;
            let grade = getGradeLetter(correct, 10);
            htmlResults = `<div class="result-item">Aciertos: ${correct}/10</div><div class="result-item" style="font-size:2rem;color:var(--primary)">NOTA: ${grade}</div>`;
            fetches.push(sendNote(config.targetCols[0], grade));
        } else {
            let c1Correct = scoreRecords.slice(0, 5).filter(x => x).length;
            let c2Correct = scoreRecords.slice(5, 10).filter(x => x).length;
            let g1 = getGradeLetter(c1Correct, 5);
            let g2 = getGradeLetter(c2Correct, 5);
            htmlResults = `
                <div class="result-item">Competencia 1: ${c1Correct}/5 aciertos -> <b>${g1}</b></div>
                <div class="result-item">Competencia 2: ${c2Correct}/5 aciertos -> <b>${g2}</b></div>`;
            fetches.push(sendNote(config.targetCols[0], g1));
            fetches.push(sendNote(config.targetCols[1], g2));
        }

        document.getElementById('res-detail').innerHTML = htmlResults;
        const statusDiv = document.getElementById('save-status');
        statusDiv.innerText = "Registrando notas en el sistema...";

        try {
            const results = await Promise.all(fetches);
            if(results.every(r => r.status === "success")) statusDiv.innerHTML = "<span style='color:var(--success)'>Guardado!</span>";
            else statusDiv.innerHTML = "<span style='color:var(--error)'>Errores.</span>";
        } catch (e) { statusDiv.innerText = "Error de conexión final."; }
    }

    function sendNote(col, grade) {
        return fetch(ENDPOINT, { 
            method: 'POST', 
            body: JSON.stringify({ 
                action: "update_note", 
                dni: dni, 
                curso: config.sheetName, 
                notaTarget: col, 
                nuevaNota: grade 
            }) 
        }).then(r => r.json());
    }
</script>
</body>
</html>

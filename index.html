<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game: THE TESTS</title>
    <style>
        :root {
            --bg-color: #f9fafb;
            --text-color: #333;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --border-color: #e5e7eb;
            --error-color: #ef4444;
            --success-color: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shado: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            idth: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1, h2 { margin-top: 0; }
        p { margin-bottom: 1.5rem; line-height: 1.5; font-size: 0.95rem; }
        input[type="text"], select {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            text-align: center;
            font-family: inherit;
        }
        select { text-align: left; width: 100%; cursor: pointer; }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            font-weight: bold;
        }
        button:hover:not(:disabled) { background-color: var(--primary-hover); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .hidden { display: none !important; }
        .options-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
        .option-btn {
            background-color: white;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            font-weight: normal;
        }
        .option-btn:hover { background-color: #f3f4f6; }
        .status-msg { margin-top: 1rem; font-weight: bold; font-size: 0.9rem;}
        .error { color: var(--error-color); }
        .success { color: var(--success-color); }
        #question-counter { font-size: 0.8rem; color: #6b7280; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px;}
        .results-box { background: #f3f4f6; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container" id="login-screen">
    <h1>THE TEST</h1>
    <p>Selecciona el tema de tu examen e ingresa tu DNI para comenzar. Son 10 preguntas por prueba =).</p>
    
    <select id="topic-select">
        <option value="divisibilidad">Aritmética | Divisibilidad y Propiedades</option>
        <option value="estadistica">Aritmética | Estadística Descriptiva (MPNC)</option>
        <option value="quimica">Química | Nomenclatura Inorgánica</option>
    </select>

    <input type="text" id="dni-input" placeholder="Ingresa tu DNI (8 dígitos)" maxlength="8">
    <button onclick="startQuiz()">Empezar Prueba</button>
    <div id="login-status" class="status-msg error"></div>
</div>

<div class="container hidden" id="quiz-screen">
    <div id="question-counter">Pregunta 1 de 10</div>
    <h2 id="question-text" style="font-size: 1.15rem; margin-bottom: 1.5rem;">Cargando...</h2>
    <div class="options-grid" id="options-container"></div>
</div>

<div class="container hidden" id="result-screen">
    <h1>Resultados Finales</h1>
    <div id="score-details" class="results-box">
        <!-- Se llena dinámicamente -->
    </div>
    <div id="upload-status" class="status-msg">Procesando y guardando notas...</div>
</div>

<script>
    // URL DE TU DEPLOY EN GOOGLE APPS SCRIPT
    const ENDPOINT = "https://script.google.com/macros/s/AKfycbziU73psxW6RLfEwH4dhfwNPuglPza8hLWi4cUyI5DkhdhbbY852bvuioWsTR2Rpx-9/exec";
    
    const TOTAL_QUESTIONS = 10;
    let dni = "";
    let activeConfig = null;
    let currentQIndex = 0;
    let quizQuestions = [];
    let userAnswers = []; // Guardará true/false por cada respuesta

    // ----------------------------------------------------
    // BANCOS DE PREGUNTAS
    // ----------------------------------------------------

    // 1. Divisibilidad (Aritmética)
    const bankDivisibilidad = [
        {q: "Si a|b y a|c, entonces a|(b+c)", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Si a|b, entonces a|bc para cualquier entero c", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Dos enteros consecutivos siempre son coprimos", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Si a|bc y a es coprimo con b, entonces a|c", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "a^n - b^n siempre es divisible por a - b", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "El único divisor entero positivo común de dos números coprimos es 1", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "0 es divisible por cualquier entero no nulo", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Cualquier entero es divisible por 0", options: ["Verdadero", "Falso"], answer: "Falso"},
        {q: "Tres impares consecutivos son coprimos dos a dos", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Al sumar un múltiplo de 'a' al número 'b', altera su divisibilidad respecto a 'a'", options: ["Verdadero", "Falso"], answer: "Falso"}
    ];
    // Rellenamos el de divisibilidad con numéricos aleatorios hasta 50
    const divisores = [2, 3, 4, 5, 6, 9];
    for(let i = 0; i < 40; i++) {
        let div = divisores[Math.floor(Math.random() * divisores.length)];
        let esDiv = Math.random() > 0.5;
        let num = esDiv ? div * (Math.floor(Math.random() * 50) + 5) : (div * (Math.floor(Math.random() * 50) + 5)) + 1;
        bankDivisibilidad.push({ q: `¿El número ${num} es divisible por ${div}?`, options: ["Sí", "No"], answer: esDiv ? "Sí" : "No" });
    }

    // 2. Nomenclatura Inorgánica (Química)
    const bankQuimica = [
        {q: "En nomenclatura clásica, el sufijo para la mayor de dos valencias es:", options: ["-ico", "-oso", "-ato"], answer: "-ico"},
        {q: "Fórmula general de los superóxidos:", options: ["M(O2)n", "M(O3)n", "M2On"], answer: "M(O2)n"},
        {q: "Estado de oxidación aparente del oxígeno en los ozónidos:", options: ["-1/3", "-1/2", "-2"], answer: "-1/3"},
        {q: "Se antepone a la palabra óxido en la proporción de oxígeno menor a la normal:", options: ["Sub-", "Per-", "Hipo-"], answer: "Sub-"},
        {q: "Los ácidos hidrácidos puros/gaseosos usan el sufijo:", options: ["-uro", "-hídrico", "-ato"], answer: "-uro"},
        {q: "El sufijo -ito en oxisales proviene del ácido con sufijo:", options: ["-oso", "-ico", "-hídrico"], answer: "-oso"},
        {q: "Según la nomenclatura IUPAC, el Fe2O3 se nombra:", options: ["Trióxido de dihierro", "Óxido de hierro (III)", "Óxido férrico"], answer: "Trióxido de dihierro"},
        {q: "El prefijo 'orto-' significa la adición de ___ moléculas de agua al anhídrido.", options: ["3", "2", "1"], answer: "3"},
        {q: "Sales binarias derivadas de los halógenos con estado de oxidación -1:", options: ["Haluros", "Calcogenuros", "Carbonatos"], answer: "Haluros"},
        {q: "KNO2 se nombra tradicionalmente como:", options: ["Nitrito de potasio", "Nitrato de potasio", "Nitrato potásico"], answer: "Nitrito de potasio"},
        {q: "Los peroxoácidos intercalan el prefijo:", options: ["peroxo-", "piro-", "meta-"], answer: "peroxo-"},
        {q: "Adición de 1 molécula de agua a un anhídrido forma un oxácido:", options: ["Meta-", "Piro-", "Orto-"], answer: "Meta-"},
        {q: "En Nomenclatura Stock, el estado de oxidación se indica con números romanos.", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Na2CO3 representa la fórmula del Carbonato de sodio.", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "HCl(aq) en disolución acuosa se llama:", options: ["Ácido clorhídrico", "Cloruro de hidrógeno"], answer: "Ácido clorhídrico"},
        {q: "Los óxidos especiales son excepciones con iones complejos o deficiencias de oxígeno.", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Los ozónidos son compuestos altamente estables y poco reactivos.", options: ["Verdadero", "Falso"], answer: "Falso"},
        {q: "Ca(IO3)2 se nombra como Yodato de calcio.", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Los calcogenatos derivan de oxácidos con valencias +4, +6.", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "El prefijo mono- en la nomenclatura Sistemática IUPAC nunca puede omitirse.", options: ["Verdadero", "Falso"], answer: "Falso"}
    ];

    // 3. Estadística Descriptiva (Aritmética)
    const bankEstadistica = [
        {q: "Fórmula general de posición para medidas no centrales:", options: ["(k * n) / Divisor", "(k + n) / Divisor", "k / (n * Divisor)"], answer: "(k * n) / Divisor"},
        {q: "Un Sextil divide los datos en ___ partes iguales.", options: ["6", "5", "10"], answer: "6"},
        {q: "Un Decil divide el conjunto en ___ partes.", options: ["10", "12", "9"], answer: "10"},
        {q: "Si la fórmula de posición resulta 4.2, ¿qué lugar ocupa el dato buscado?", options: ["5", "4", "4.2"], answer: "5"},
        {q: "La escala especial de Estaninos divide los datos en:", options: ["9 partes", "10 partes", "11 partes"], answer: "9 partes"},
        {q: "La 'Escala C' divide el conjunto en 11 partes.", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Interpretación: 'El X% de los datos es menor o igual al valor obtenido'.", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Para calcular estas medidas, NO es necesario ordenar los datos.", options: ["Verdadero", "Falso"], answer: "Falso"},
        {q: "En un Cuadragésile (según la tabla), el divisor es:", options: ["40", "50", "20"], answer: "40"},
        {q: "¿Qué porcentaje representa cada parte (1/N) en un Vigésile?", options: ["5%", "10%", "20%"], answer: "5%"},
        {q: "Los Octiles dividen el conjunto en 8 partes.", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "¿Cuál de estos NO es una escala especial de porcentaje variable?", options: ["Deciles", "Esteninos", "Estaninos", "Escala C"], answer: "Deciles"},
        {q: "¿En cuántas partes divide un Millil?", options: ["1000", "100", "500"], answer: "1000"},
        {q: "Si la cantidad de partes es N, la fórmula de los cortes matemáticos es:", options: ["N - 1", "N + 1", "N / 2"], answer: "N - 1"},
        {q: "En los Estaninos, el número de cortes es 8.", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Un Tercil tiene exactamente 2 cortes.", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "Un porcentaje de 0.0833 (8.33%) por parte pertenece a los:", options: ["Duodeciles", "Deciles", "Terciles"], answer: "Duodeciles"},
        {q: "Las medidas de posición sirven para conocer la posición relativa de un dato.", options: ["Verdadero", "Falso"], answer: "Verdadero"},
        {q: "¿Qué porcentaje de datos acumula el primer cuartil (inferencia matemática)?", options: ["25%", "50%", "10%"], answer: "25%"},
        {q: "En las escalas especiales, los porcentajes asignados a las partes son variables.", options: ["Verdadero", "Falso"], answer: "Verdadero"}
    ];

    // ----------------------------------------------------
    // CONFIGURACIÓN DE RUTAS Y HOJAS
    // ----------------------------------------------------
    const CONFIG = {
        divisibilidad: {
            curso: "Aritmética Algebra",
            targetCols: ["L"], // 1 Sola nota de 10 preguntas
            bank: bankDivisibilidad
        },
        estadistica: {
            curso: "Aritmética Algebra",
            targetCols: ["AJ"], // 1 Sola nota de 10 preguntas
            bank: bankEstadistica
        },
        quimica: {
            curso: "Química",
            targetCols: ["O", "V"], // 2 Notas: 5 de Comp1 (Col O) y 5 de Comp2 (Col W)
            bank: bankQuimica
        }
    };

    // Función iniciar
    function startQuiz() {
        const inputDni = document.getElementById('dni-input').value.trim();
        const selectTopic = document.getElementById('topic-select').value;
        const status = document.getElementById('login-status');
        
        if (!/^\d{8}$/.test(inputDni)) {
            status.textContent = "El DNI debe tener 8 números exactos.";
            return;
        }
        
        dni = inputDni;
        activeConfig = CONFIG[selectTopic];
        status.textContent = "";
        
        // Seleccionar 10 preguntas aleatorias del banco correspondiente
        quizQuestions = activeConfig.bank.sort(() => 0.5 - Math.random()).slice(0, TOTAL_QUESTIONS);
        userAnswers = [];
        currentQIndex = 0;
        
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        renderQuestion();
    }

    // Renderizar Pregunta
    function renderQuestion() {
        if (currentQIndex >= TOTAL_QUESTIONS) {
            finishQuiz();
            return;
        }

        const qData = quizQuestions[currentQIndex];
        
        // Etiqueta visual para Química (Competencia 1 o 2)
        let compLabel = "";
        if (activeConfig.targetCols.length === 2) {
            compLabel = currentQIndex < 5 ? " | Competencia 1" : " | Competencia 2";
        }

        document.getElementById('question-counter').textContent = `Pregunta ${currentQIndex + 1} de ${TOTAL_QUESTIONS}${compLabel}`;
        document.getElementById('question-text').textContent = qData.q;
        
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = "";
        
        qData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => handleAnswer(opt, qData.answer);
            optsContainer.appendChild(btn);
        });
    }

    // Manejar Respuesta
    function handleAnswer(selected, correct) {
        userAnswers.push(selected === correct); // Guarda true o false
        currentQIndex++;
        renderQuestion();
    }

    // Convertir puntaje numérico a Nota Alfabética
    function calculateGrade(correctas, sobreMaximo) {
        if (sobreMaximo === 10) {
            if (correctas >= 9) return "AD";
            if (correctas >= 7) return "A";
            if (correctas >= 5) return "B";
            return "C";
        } else if (sobreMaximo === 5) {
            if (correctas === 5) return "AD";
            if (correctas === 4) return "A";
            if (correctas === 3) return "B";
            return "C";
        }
        return "C";
    }

    // Terminar Prueba y Armar Lógica de Envío
    function finishQuiz() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        const detailsBox = document.getElementById('score-details');
        let fetchesToRun = [];

        // LÓGICA 1: Curso regular (1 sola nota sobre 10 preguntas)
        if (activeConfig.targetCols.length === 1) {
            let correctas = userAnswers.filter(ans => ans === true).length;
            let nota = calculateGrade(correctas, 10);
            
            detailsBox.innerHTML = `
                <p style="margin-bottom:5px;">Aciertos: <b>${correctas} de 10</b></p>
                <h2 style="color:var(--primary-color);">Nota Alcanzada: ${nota}</h2>
            `;

            fetchesToRun.push(sendData(activeConfig.curso, activeConfig.targetCols[0], nota));
        } 
        // LÓGICA 2: Química (Separado: 5 para Comp 1 y 5 para Comp 2)
        else if (activeConfig.targetCols.length === 2) {
            let aciertosC1 = userAnswers.slice(0, 5).filter(ans => ans === true).length;
            let aciertosC2 = userAnswers.slice(5, 10).filter(ans => ans === true).length;
            
            let notaC1 = calculateGrade(aciertosC1, 5);
            let notaC2 = calculateGrade(aciertosC2, 5);

            detailsBox.innerHTML = `
                <p style="margin-bottom:5px;">Competencia 1 (Preg. 1-5): <b>${aciertosC1}/5</b> -> Nota: <b>${notaC1}</b></p>
                <p style="margin-bottom:5px;">Competencia 2 (Preg. 6-10): <b>${aciertosC2}/5</b> -> Nota: <b>${notaC2}</b></p>
            `;

            // Preparamos 2 peticiones separadas
            fetchesToRun.push(sendData(activeConfig.curso, activeConfig.targetCols[0], notaC1)); // Col O
            fetchesToRun.push(sendData(activeConfig.curso, activeConfig.targetCols[1], notaC2)); // Col W
        }

        // Ejecutar envío
        const statusDiv = document.getElementById('upload-status');
        
        Promise.all(fetchesToRun)
            .then(results => {
                // Verificar si todos respondieron "success"
                let allSuccess = results.every(r => r.status === "success");
                if (allSuccess) {
                    statusDiv.textContent = "¡Registro Exitoso! Tus notas fueron guardadas.";
                    statusDiv.className = "status-msg success";
                } else {
                    // Si el DNI falló, mostraremos el error devuelto
                    let errorMsg = results.find(r => r.status === "error").message;
                    statusDiv.textContent = "Atención: " + errorMsg; 
                    statusDiv.className = "status-msg error";
                }
            })
            .catch(error => {
                statusDiv.textContent = "Error de red. Asegúrate de estar conectado a internet.";
                statusDiv.className = "status-msg error";
                console.error("Error Fetch:", error);
            });
    }

    // Helper: Crea el Fetch hacia el Google Apps Script
    function sendData(cursoName, columnTarget, notaValue) {
        const payload = {
            "dni": dni,
            "curso": cursoName,
            "notaTarget": columnTarget, 
            "nuevaNota": notaValue
        };

        return fetch(ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
        }).then(res => res.json());
    }
</script>

</body>
</html>
